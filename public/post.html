<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Post - WikiBrina</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<body class="post">

<header class="container-fluid d-flex flex-wrap align-items-center">

    <img src="assets/img/logo_wikibrina.png" id="logo" alt="">

    <input id="input_pesquisar" class="form-control flex-grow-1" placeholder="Ex: @username" type="text">

    <div id="header_div_btn" class="d-flex flex-wrap gap-2 ms-auto">

        <a class="header_btn" href="index.html">Home</a>

        <a class="header_btn" href="about.html">About</a>

        <a class="header_btn" href="post.html">Criar Posts</a>

        <a class="header_btn"

        id="menuFavoritos" href="favoritos.html"> Favoritos </a>

        <a class="header_btn" id="menuCadastro" href="cadastro_itens.html"> Cadastro </a>

        <a class="header_btn" id="menuLogin" href="login.html"> Login </a>

        <a id="menuLogout" class="header_btn" href="#" onclick="logout()"> Logout </a>

    </div>

</header>

<div id="div_main" class="container mt-5">

    <main class="d-flex flex-column align-items-center">

        <h2 class="mb-4 text-center">Fazer um novo post</h2>

        <div class="card p-4 w-100" style="max-width: 600px;">

            <input id="id" type="hidden">

            <div class="mb-3">
                <label>Descrição</label>
                <textarea id="descricao" class="form-control" placeholder="Sobre o que você quer postar?"></textarea>
            </div>

            <div class="mb-3">
                <label>Imagem (URL)</label>
                <input id="imagem" class="form-control" placeholder="https://...">
            </div>

            <div class="mb-3">
                <label>Álbum/Assunto</label>
                <input id="album" class="form-control" placeholder="Ex: Short n' Sweet">
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-success" onclick="criarPost()">Publicar</button>
                <button class="btn btn-secondary" onclick="limparFormularioPost()">Limpar</button>
            </div>

        </div>

        <hr class="my-5 w-100">

        <h3 class="mb-3 text-center">Meus posts</h3>

        <div id="listaMeusPosts" class="w-100"></div>

    </main>

</div>

<footer id="footer_login" class="container-fluid"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/login.js"></script>
<script src="assets/js/favoritos.js"></script>
<script src="assets/js/post.js"></script>

<script>
atualizarMenu();
verificarLoginPost();
listarMeusPosts();
</script>

</body>
</html>
