<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WikiBrina</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
    <script src="assets/js/login.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
</head>

<body class="cadastro">

<header class="container-fluid d-flex flex-wrap align-items-center">

    <img src="assets/img/logo_wikibrina.png" id="logo" alt="">

    <input id="input_pesquisar" class="form-control flex-grow-1" placeholder="Ex: @username" type="text">

    <div id="header_div_btn" class="d-flex flex-wrap gap-2 ms-auto">

        <a class="header_btn" href="index.html">Home</a>

        <a class="header_btn" href="about.html">About</a>

        <a class="header_btn" href="post.html">Criar Posts</a>

        <a class="header_btn"

        id="menuFavoritos" href="favoritos.html"> Favoritos </a>

        <a class="header_btn" id="menuCadastro" href="cadastro_itens.html"> Cadastro </a>

        <a class="header_btn" id="menuLogin" href="login.html"> Login </a>

        <a id="menuLogout" class="header_btn" href="#" onclick="logout()"> Logout </a>

    </div>

</header>

<div id="div_main" class="container">

    <main class="d-flex justify-content-center align-items-center">

        <div id="card">

            <div id="div_inputs">

                <input
                    id="nome"
                    class="form-control mb-2"
                    type="text"
                    placeholder="Nome">

                <input
                    id="login"
                    class="form-control mb-2"
                    type="text"
                    placeholder="Login">

                <input
                    id="email"
                    class="form-control mb-2"
                    type="email"
                    placeholder="E-mail">

                <input
                    id="senha"
                    class="form-control mb-2"
                    type="password"
                    placeholder="Senha">

                <input
                    id="confirmarSenha"
                    class="form-control mb-2"
                    type="password"
                    placeholder="Confirmar senha">

            </div>

            <div id="div_btn">

                <button id="login_btn" class="btn" onclick="cadastrar()">Cadastre-se</button>

            </div>

        </div>

    </main>

</div>

<footer id="footer_login" class="container-fluid"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/login.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/favoritos.js"></script>
<script>
atualizarMenu();
</script>

</body>
</html>
